name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pypi:
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/pypi.yml

  homebrew:
    needs: pypi
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      PACKAGE: cactus-compute
      TAP: cactus-compute/homebrew-cactus
      TAG: ${{ github.event.release.tag_name }}
    steps:
      - name: Resolve version
        id: ver
        run: |
          raw="${TAG#v}"
          version=$(python3 -c "raw='${raw}'; print(raw + '.0' if raw.count('.') == 1 else raw)")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Resolve platform wheel URLs and SHA256 from PyPI
        id: pypi
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          for i in $(seq 1 10); do
            if json=$(curl -fsSL "https://pypi.org/pypi/${PACKAGE}/${VERSION}/json"); then
              break
            fi
            echo "Waiting for PyPI metadata (attempt $i)..."
            sleep 30
          done
          [ -n "$json" ] || { echo "PyPI metadata not available for ${PACKAGE} ${VERSION}"; exit 1; }
          pick() { echo "$json" | jq -er --arg re "$1" '.urls[] | select(.packagetype=="bdist_wheel" and (.filename|test($re))) | .'"$2"; }
          {
            echo "macos_url=$(pick macosx url)"
            echo "macos_sha=$(pick macosx digests.sha256)"
            echo "linux_url=$(pick manylinux url)"
            echo "linux_sha=$(pick manylinux digests.sha256)"
          } >> "$GITHUB_OUTPUT"

      - name: Update tap formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
          MACOS_URL: ${{ steps.pypi.outputs.macos_url }}
          MACOS_SHA: ${{ steps.pypi.outputs.macos_sha }}
          LINUX_URL: ${{ steps.pypi.outputs.linux_url }}
          LINUX_SHA: ${{ steps.pypi.outputs.linux_sha }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${TAP}.git" tap
          mkdir -p tap/Formula
          cat > tap/Formula/cactus.rb <<EOF
          class Cactus < Formula
            desc "On-device AI inference"
            homepage "https://cactuscompute.com"
            version "${VERSION}"
            license "Cactus Compute License"
            include Language::Python::Virtualenv
            depends_on "python@3.12"
            depends_on arch: :arm64

            on_macos do
              url "${MACOS_URL}"
              sha256 "${MACOS_SHA}"
            end

            on_linux do
              url "${LINUX_URL}"
              sha256 "${LINUX_SHA}"
            end

            livecheck do
              url "https://pypi.org/pypi/${PACKAGE}/json"
              regex(/"version":\s*"(\d+(?:\.\d+)+)"/i)
            end

            def install
              virtualenv_create(libexec, "python3.12")
              wheel = Dir[buildpath/"*.whl"].first
              odie "no wheel found in build directory" if wheel.nil?
              system Formula["python@3.12"].opt_bin/"python3.12", "-m", "pip",
                     "--python=#{libexec}/bin/python", "install", "--no-deps", wheel
              bin.install_symlink libexec/"bin/cactus"
            end

            test do
              assert_equal "cactus #{version}\n", shell_output("#{bin}/cactus --version")
              assert_match "libcactus_engine",
                Dir[libexec/"lib/python*/site-packages/cactus/bindings/lib/*"].join
            end
          end
          EOF
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cactus.rb
          git commit -m "Update cactus to ${TAG}"
          git push origin main

  docs:
    permissions:
      contents: write
    uses: ./.github/workflows/docs.yml
    with:
      version: ${{ github.event.release.tag_name }}
